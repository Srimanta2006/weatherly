<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="https://imgs.search.brave.com/gsEAkVi4utMBVVaop5MNDSVIZ-GcuA2RQ48i0LkWJXc/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9zdGF0/aWMudmVjdGVlenku/Y29tL3N5c3RlbS9y/ZXNvdXJjZXMvdGh1/bWJuYWlscy8wMzkv/MTM4LzMyNC9zbWFs/bC9jbG91ZC13aXRo/LXN1bi0zZC1yZWFs/aXN0aWMtd2VhdGhl/ci1pY29uLTNkLXJl/bmRlcmluZy1pbGx1/c3RyYXRpb24tcG5n/LnBuZw">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="light">
    <div class="app">
        <header>
            <div class="header-logo">
                <span class="logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v2" />
                        <path d="m4.93 4.93 1.41 1.41" />
                        <path d="M20 12h2" />
                        <path d="m19.07 4.93-1.41 1.41" />
                        <path d="M15.947 12.65a4 4 0 0 0-5.925-4.128" />
                        <path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z" />
                    </svg>
                </span>
                Weather
            </div>
            <div class="header-right">
                <button class="icon-btn" id="themeToggle">
                    <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4" />
                        <path d="M12 2v2" />
                        <path d="M12 20v2" />
                        <path d="m4.93 4.93 1.41 1.41" />
                        <path d="m17.66 17.66 1.41 1.41" />
                        <path d="M2 12h2" />
                        <path d="M20 12h2" />
                        <path d="m6.34 17.66-1.41 1.41" />
                        <path d="m19.07 4.93-1.41 1.41" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="search-container">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m21 21-4.34-4.34" />
                    <circle cx="11" cy="11" r="8" />
                </svg>
                <input type="text" name="" id="cityName" placeholder="Search for a city...">
            </div>
            <button class="icon-btn locate-btn" id="LocationBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="2" x2="5" y1="12" y2="12" />
                    <line x1="19" x2="22" y1="12" y2="12" />
                    <line x1="12" x2="12" y1="2" y2="5" />
                    <line x1="12" x2="12" y1="19" y2="22" />
                    <circle cx="12" cy="12" r="7" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </button>
        </div>

        <div class="card">
            <div class="card-top">
                <div>
                    <div class="city" id="city">Bhubaneswar</div>
                    <div class="date" id="dateLine">Friday, 24 May · 10:30 AM</div>
                </div>
                <div class="now-icon"><img id="nowIcon" src="" alt="Current condition"></div>
            </div>
            <div class="card-bottom">
                <div>
                    <div class="temp" id="nowTemp">29 <sup>°C</sup></div>
                    <div class="feels" id="feelsLike">Feels like 32°</div>
                </div>
                <div class="condition" id="nowCondition">Partly Cloudy</div>
            </div>
        </div>

        <div class="meta-grid">
            <div class="meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z" />
                </svg>
                <div class="meta-label" id="humidity">Humidity</div>
                <div class="meta-value" id="humidityValue">68%</div>
            </div>
            <div class="meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12.8 19.6A2 2 0 1 0 14 16H2" />
                    <path d="M17.5 8a2.5 2.5 0 1 1 2 4H2" />
                    <path d="M9.8 4.4A2 2 0 1 1 11 8H2" />
                </svg>
                <div class="meta-label">Wind</div>
                <div class="meta-value" id="windSpeed">14 km/h</div>
            </div>
            <div class="meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m12 14 4-4" />
                    <path d="M3.34 19a10 10 0 1 1 17.32 0" />
                </svg>
                <div class="meta-label">Pressure</div>
                <div class="meta-value" id="Pressure">1012 hPa</div>
            </div>
            <div class="meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                <div class="meta-label">Visibility</div>
                <div class="meta-value" id="visibility">10 km</div>
            </div>
        </div>

        <div class="forecast-grid">
            <div class="forecast-heading">
                5 Day Forecast
            </div>
            <div class="forecast-row" id="forecastRow">
               <!-- <div class="day-card active">
                     <div class="day-name">Friday</div>
                    <img src="${d.icon}" alt="${d.condition}">
                    <div class="day-hi">29°</div>
                    <div class="day-lo">21°</div>
                </div>
                <div class="day-card">
                    <div class="day-name">Friday</div>
                    <img src="${d.icon}" alt="${d.condition}">
                    <div class="day-hi">29°</div>
                    <div class="day-lo">21°</div>
                </div>
                <div class="day-card">
                    <div class="day-name">Friday</div>
                    <img src="${d.icon}" alt="${d.condition}">
                    <div class="day-hi">29°</div>
                    <div class="day-lo">21°</div>
                </div>
                <div class="day-card">
                    <div class="day-name">Friday</div>
                    <img src="${d.icon}" alt="${d.condition}">
                    <div class="day-hi">29°</div>
                    <div class="day-lo">21°</div>
                </div>
                <div class="day-card">
                    <div class="day-name">Friday</div>
                    <img src="${d.icon}" alt="${d.condition}">
                    <div class="day-hi">29°</div>
                    <div class="day-lo">21°</div>
                </div> -->
            </div>
        </div>

        <div class="sun-timing">
            <div class="sun-row">
                <div class="sun-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 2v8" />
                        <path d="m4.93 10.93 1.41 1.41" />
                        <path d="M2 18h2" />
                        <path d="M20 18h2" />
                        <path d="m19.07 10.93-1.41 1.41" />
                        <path d="M22 22H2" />
                        <path d="m8 6 4-4 4 4" />
                        <path d="M16 18a4 4 0 0 0-8 0" />
                    </svg>
                    <div>
                        <div class="lbl">Sunrise</div>
                        <div class="val" id="sunrise">5:24 AM</div>
                    </div>
                </div>
                <div class="sun-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 10V2" />
                        <path d="m4.93 10.93 1.41 1.41" />
                        <path d="M2 18h2" />
                        <path d="M20 18h2" />
                        <path d="m19.07 10.93-1.41 1.41" />
                        <path d="M22 22H2" />
                        <path d="m16 6-4 4-4-4" />
                        <path d="M16 18a4 4 0 0 0-8 0" />
                    </svg>
                    <div>
                        <div class="lbl">Sunset</div>
                        <div class="val" id="sunset">6:45 PM</div>
                    </div>
                </div>
                <div class="sun-item uv-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 12h.01" />
                        <path
                            d="M14 15.4641a4 4 0 0 1-4 0L7.52786 19.74597 A 1 1 0 0 0 7.99303 21.16211 10 10 0 0 0 16.00697 21.16211 1 1 0 0 0 16.47214 19.74597z" />
                        <path
                            d="M16 12a4 4 0 0 0-2-3.464l2.472-4.282a1 1 0 0 1 1.46-.305 10 10 0 0 1 4.006 6.94A1 1 0 0 1 21 12z" />
                        <path
                            d="M8 12a4 4 0 0 1 2-3.464L7.528 4.254a1 1 0 0 0-1.46-.305 10 10 0 0 0-4.006 6.94A1 1 0 0 0 3 12z" />
                    </svg>
                    <div>
                        <div class="lbl">UV Index</div>
                        <div class="val" id="uvIndex">6 (High)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
